name: Advanced DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scans:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret Scanning (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Static Analysis (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml

      - name: Dependency Check (Snyk or Safety)
        run: |
          pip install safety
          safety check -r requirements.txt --json > dependency-report.json
        continue-on-error: true

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: dependency-report.json

  build-and-package:
    needs: security-scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Local Image
        run: |
          docker build -t secure-app:${{ github.sha }} .

      - name: Generate SBOM (Anchore Syft)
        uses: anchore/sbom-action@v0
        with:
          image: secure-app:${{ github.sha }}
          format: cyclonedx-json
          output-file: app-sbom.cyclonedx.json

      - name: Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Upload Build Artifacts (SBOM & Image Tag)
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build-bundle
          path: |
            app-sbom.cyclonedx.json
